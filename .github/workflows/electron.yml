name: Build Electron App

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install
      - run: npm run build:web

      - name: Build Electron (publish on tags)
        if: startsWith(github.ref, 'refs/tags/')
        run: npm run build:electron -- --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Electron (no publish)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        run: npm run build:electron -- --publish never

      - uses: actions/upload-artifact@v4
        with:
          name: app-${{ matrix.os }}
          path: release/
